# Optional Render Blueprint — lets you create the API service in one step via
# Render's "New > Blueprint" flow instead of filling in the "New > Web
# Service" form by hand. Secrets are intentionally left for you to fill in
# via the Render dashboard (sync: false) rather than committed here.
#
# If Render's Blueprint schema has changed since this was written and the
# import fails, use the manual "New > Web Service" steps in
# docs/DEPLOY_FREE_TIER.md instead — same settings, just typed into the form.
services:
  - type: web
    name: gainly-api
    runtime: node
    plan: free
    # --include=dev is required here: NODE_ENV=production (set below, needed
    # at runtime for secure cookies) is also visible to the build step on
    # Render, and npm skips devDependencies — including @nestjs/cli, which
    # provides the `nest` command this build needs — whenever it sees
    # production mode. This flag overrides that.
    buildCommand: npm install --include=dev && npx prisma generate --schema=apps/api/prisma/schema.prisma && npm run build --workspace apps/api
    startCommand: npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma && node apps/api/dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: COOKIE_SECRET
        sync: false
      # Vercel production domain. Safe to commit — it's an origin, not a
      # secret. Update if you attach a custom domain later.
      - key: CORS_ORIGINS
        value: https://gainly-web.vercel.app
