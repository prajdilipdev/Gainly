name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace apps/api

      - name: Typecheck API
        run: npx tsc --noEmit
        working-directory: apps/api

      - name: Test API
        run: npm test --workspace apps/api

      - name: Build API
        run: npm run build --workspace apps/api

      - name: Build web
        run: npm run build --workspace apps/web

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t spt-api:${{ github.sha }} .

      - name: Build web image
        run: docker build -f apps/web/Dockerfile -t spt-web:${{ github.sha }} .

      # Push to your registry here, e.g.:
      # - name: Push images
      #   run: |
      #     docker tag spt-api:${{ github.sha }} ghcr.io/${{ github.repository }}/api:latest
      #     docker push ghcr.io/${{ github.repository }}/api:latest
